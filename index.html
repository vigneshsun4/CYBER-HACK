<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prompt-a-thon Base Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e272e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            touch-action: none; 
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            /* Ultimate Sexy Canvas Container Styling */
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
            animation: canvasPulse 8s infinite alternate ease-in-out;
        }

        /* Ambient glowing frame around the entire window */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 150px rgba(0, 212, 255, 0.2), inset 0 0 50px rgba(184, 41, 221, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        /* Tiny ambient pulsing glow for the whole monitor */
        @keyframes canvasPulse {
            0% { filter: contrast(1.0) brightness(1.0) drop-shadow(0 0 0px rgba(0,255,200,0)); }
            100% { filter: contrast(1.05) brightness(1.02) drop-shadow(0 0 20px rgba(0,212,255,0.05)); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Game Modules -->
    <script src="js/audio.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
    <script src="js/level.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/hacking.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>

    <!-- Initialization -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Prevent pixel scaling issues
            ctx.imageSmoothingEnabled = false;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const game = new Game(canvas, ctx);
        game.loop();
    </script>
</body>
</html>
